<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>orbit-tracker</title>
    <style>
      html, body, #cesiumContainer { width:100%; height:100%; margin:0; padding:0; overflow:hidden; }
      body { background:#000; font-family: system-ui, sans-serif; }

      /* レスポンシブ調整: スマホで UI パネルが重ならないようにする */
      @media (max-width: 768px) {
        #ot-search { width: 56vw !important; max-width: 230px; }
        #ot-detail { width: calc(100vw - 24px) !important; max-width: 320px; max-height: 60vh; overflow-y: auto; }
        #ot-tabs   { width: 44vw !important; max-width: 175px; max-height: 38vh; overflow-y: auto; font-size: 11px !important; }
        #ot-density { width: 44vw !important; max-width: 175px; font-size: 10px !important; }
      }
      @media (max-width: 420px) {
        #ot-tabs, #ot-density { font-size: 10px !important; padding: 8px 9px !important; }
        #ot-search input { padding: 6px !important; font-size: 12px !important; }
      }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
